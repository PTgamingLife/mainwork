<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>28天品牌故事 — 後臺管理</title>
  <style>
    :root {
      --ink:#1A0F00; --gold:#C9A84C; --gold-d:#A0782C;
      --cream:#FFF8EE; --white:#FFFFFF; --border:#E8DBC8;
      --red:#C0392B; --purple:#8E44AD; --green:#27AE60;
      --blue:#2980B9; --orange:#E67E22;
      --radius:12px; --shadow:4px 4px 0 rgba(0,0,0,.12);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Helvetica Neue',Arial,sans-serif;background:#F5EDD8;color:var(--ink);min-height:100vh}
    /* ── Login ── */
    #loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-card{background:var(--white);border:3px solid var(--ink);border-radius:var(--radius);box-shadow:var(--shadow);padding:36px 28px;max-width:360px;width:100%;text-align:center}
    .login-card h1{font-size:22px;font-weight:900;margin-bottom:6px}
    .login-card p{font-size:13px;color:#7A6A5A;margin-bottom:22px}
    .field label{display:block;font-size:12px;font-weight:800;text-align:left;margin-bottom:5px}
    .field input{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:8px;font-size:16px;text-align:center;letter-spacing:4px;font-family:inherit}
    .field input:focus{outline:none;border-color:var(--gold)}
    .btn{display:block;width:100%;padding:12px;background:var(--gold);color:var(--ink);border:2px solid var(--ink);border-radius:8px;font-size:15px;font-weight:900;cursor:pointer;margin-top:14px;font-family:inherit}
    .btn:hover{background:var(--gold-d)}
    .err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
    /* ── Layout ── */
    #app{display:none;min-height:100vh}
    .topbar{background:var(--ink);color:var(--gold);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .topbar h1{font-size:16px;font-weight:900}
    .topbar-right{display:flex;gap:10px;align-items:center}
    .topbar-btn{background:none;color:var(--gold);border:1.5px solid var(--gold);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;font-weight:700}
    .tabs{display:flex;border-bottom:2px solid var(--border);background:var(--white);padding:0 16px}
    .tab-btn{padding:12px 16px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;color:#7A6A5A;border-bottom:3px solid transparent;margin-bottom:-2px}
    .tab-btn.active{color:var(--ink);border-bottom-color:var(--gold)}
    .panel{display:none;padding:16px}
    .panel.active{display:block}
    /* ── Stats ── */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
    .stat-card{background:var(--white);border:2px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px}
    .stat-num{font-size:32px;font-weight:900;color:var(--gold);line-height:1.1}
    .stat-lbl{font-size:12px;color:#7A6A5A;margin-top:3px}
    /* ── Table ── */
    .card{background:var(--white);border:2px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
    .card-hd{font-size:14px;font-weight:900;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);font-size:11px;font-weight:800;color:#7A6A5A;letter-spacing:.5px}
    td{padding:9px 10px;border-bottom:1px solid var(--border)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#FFF8EE}
    .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
    .badge-done{background:#27AE6022;color:#27AE60}
    .badge-pending{background:#E67E2222;color:#E67E22}
    .pbar-wrap{background:#F0E8D8;border-radius:4px;height:7px;min-width:80px}
    .pbar-fill{background:var(--gold);border-radius:4px;height:7px;transition:width .4s}
    .link-btn{background:none;border:none;color:var(--blue);text-decoration:underline;cursor:pointer;font-size:12px;font-family:inherit;padding:0}
    /* ── Day grid ── */
    .day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
    .day-cell{border:1.5px solid var(--border);border-radius:6px;padding:8px 4px;text-align:center;font-size:11px}
    .day-cell .dc-num{font-weight:900;font-size:13px}
    .day-cell .dc-pct{color:var(--gold);font-weight:700}
    .day-cell .dc-bar{background:#F0E8D8;border-radius:2px;height:4px;margin-top:3px}
    .day-cell .dc-bar-fill{background:var(--green);border-radius:2px;height:4px}
    /* ── Member detail ── */
    #memberDetail{display:none}
    .detail-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .detail-back{font-size:20px;cursor:pointer;padding:4px 8px;background:var(--cream);border:2px solid var(--border);border-radius:8px}
    .submission-card{border:2px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:10px;cursor:pointer}
    .submission-card:hover{border-color:var(--gold)}
    .sub-day{font-size:11px;font-weight:800;color:#7A6A5A;margin-bottom:4px}
    .sub-title{font-weight:700;font-size:14px;margin-bottom:4px}
    .sub-preview{font-size:12px;color:#7A6A5A;line-height:1.5}
    .sub-full{display:none;margin-top:10px;padding:10px;background:var(--cream);border-radius:6px;font-size:13px;line-height:1.7;white-space:pre-wrap}
    /* ── Config ── */
    .cfg-row{display:flex;gap:12px;align-items:flex-end;margin-bottom:12px;flex-wrap:wrap}
    .cfg-field{flex:1;min-width:140px}
    .cfg-field label{display:block;font-size:12px;font-weight:800;margin-bottom:4px}
    .cfg-field input{width:100%;padding:8px 10px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit}
    .cfg-field input:focus{outline:none;border-color:var(--gold)}
    .btn-sm{padding:8px 18px;font-size:13px;background:var(--gold);color:var(--ink);border:2px solid var(--ink);border-radius:8px;font-weight:900;cursor:pointer;font-family:inherit}
    /* ── Chat logs ── */
    .chat-day-sec{margin-bottom:16px}
    .chat-day-hd{font-size:12px;font-weight:800;color:#7A6A5A;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px}
    .chat-row{display:flex;gap:8px;margin-bottom:6px;font-size:13px;line-height:1.5}
    .chat-role{font-weight:800;min-width:36px;flex-shrink:0}
    .chat-role.user{color:var(--blue)}
    .chat-role.ai{color:var(--purple)}
    .spinner{display:inline-block;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{color:#7A6A5A;font-size:13px;text-align:center;padding:24px}
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="loginWrap">
  <div class="login-card">
    <div style="font-size:36px;margin-bottom:8px">🏰</div>
    <h1>後臺管理</h1>
    <p>28天品牌故事挑戰</p>
    <div class="field" style="margin-top:16px">
      <label>管理員 PIN</label>
      <input id="adminPin" type="tel" inputmode="numeric" maxlength="6" placeholder="••••••" autocomplete="off"/>
    </div>
    <button class="btn" id="loginBtn">進入後臺 →</button>
    <p class="err" id="loginErr"></p>
  </div>
</div>

<!-- ── Main App ── -->
<div id="app">
  <div class="topbar">
    <h1>🏰 28天品牌故事 — 後臺</h1>
    <div class="topbar-right">
      <span id="topDate" style="font-size:12px;color:rgba(201,168,76,.7)"></span>
      <button class="topbar-btn" onclick="logout()">登出</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('overview')">📊 總覽</button>
    <button class="tab-btn" onclick="showTab('members')">👥 成員</button>
    <button class="tab-btn" onclick="showTab('days')">📅 每日進度</button>
    <button class="tab-btn" onclick="showTab('chatlogs')">💬 對話記錄</button>
    <button class="tab-btn" onclick="showTab('config')">⚙️ 設定</button>
  </div>

  <!-- Overview -->
  <div class="panel active" id="panel-overview">
    <div class="stats-grid" id="statsGrid"><div class="empty"><span class="spinner">⏳</span></div></div>
    <div class="card">
      <div class="card-hd">今日完成狀況 <span id="todayDayBadge" style="font-size:12px;background:var(--gold);padding:2px 8px;border-radius:10px;color:var(--ink)">Day ?</span></div>
      <div id="todayList"><div class="empty"><span class="spinner">⏳</span></div></div>
    </div>
  </div>

  <!-- Members -->
  <div class="panel" id="panel-members">
    <div id="memberList"></div>
    <div id="memberDetail">
      <div class="detail-header">
        <button class="detail-back" onclick="closeMemberDetail()">← 返回</button>
        <div>
          <div id="detailName" style="font-size:18px;font-weight:900"></div>
          <div id="detailSub" style="font-size:12px;color:#7A6A5A"></div>
        </div>
      </div>
      <div id="detailSubmissions"></div>
    </div>
  </div>

  <!-- Days -->
  <div class="panel" id="panel-days">
    <div class="card">
      <div class="card-hd">各天完成人數</div>
      <div class="day-grid" id="dayGrid"></div>
    </div>
  </div>

  <!-- Chat logs -->
  <div class="panel" id="panel-chatlogs">
    <div class="card">
      <div class="card-hd">
        小老師對話記錄
        <select id="chatMemberSel" style="font-size:13px;padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;background:var(--cream);font-family:inherit" onchange="loadChatLogs()">
          <option value="">— 選擇成員 —</option>
        </select>
      </div>
      <div id="chatLogContent"><div class="empty">請選擇成員查看對話記錄</div></div>
    </div>
  </div>

  <!-- Config -->
  <div class="panel" id="panel-config">
    <div class="card">
      <div class="card-hd">全域設定</div>
      <div class="cfg-row">
        <div class="cfg-field">
          <label>挑戰開始日期</label>
          <input id="cfgStartDate" type="date"/>
        </div>
        <div class="cfg-field">
          <label>團隊名稱</label>
          <input id="cfgTeamName" type="text" maxlength="20"/>
        </div>
        <div class="cfg-field" style="max-width:120px">
          <label>預計人數</label>
          <input id="cfgExpected" type="number" min="1" max="200"/>
        </div>
        <button class="btn-sm" onclick="saveConfig()">儲存</button>
      </div>
      <p id="cfgMsg" style="font-size:13px;margin-top:8px;min-height:18px"></p>
    </div>
    <div class="card">
      <div class="card-hd">管理員 PIN 更改</div>
      <div class="cfg-row">
        <div class="cfg-field" style="max-width:160px">
          <label>新 PIN（最多6位數字）</label>
          <input id="newPin" type="tel" inputmode="numeric" maxlength="6"/>
        </div>
        <button class="btn-sm" onclick="savePin()">更新 PIN</button>
      </div>
      <p id="pinMsg" style="font-size:13px;margin-top:8px;min-height:18px"></p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script>
const ADMIN_PIN_KEY = 'bazi28_admin_pin';
const DEFAULT_PIN   = '2028admin';

let sb, allMembers = [], allTasks = [], cfg = {};
let currentTab = 'overview';

// ── Init ──
window.addEventListener('DOMContentLoaded', () => {
  sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  const saved = sessionStorage.getItem('admin_authed');
  if (saved === '1') showApp();

  document.getElementById('adminPin').onkeydown = (e) => { if(e.key==='Enter') doLogin(); };
  document.getElementById('loginBtn').onclick = doLogin;
});

function doLogin() {
  const pin = document.getElementById('adminPin').value.trim();
  const stored = localStorage.getItem(ADMIN_PIN_KEY) || DEFAULT_PIN;
  if (pin === stored) {
    sessionStorage.setItem('admin_authed', '1');
    showApp();
  } else {
    document.getElementById('loginErr').textContent = 'PIN 錯誤';
  }
}

function logout() {
  sessionStorage.removeItem('admin_authed');
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminPin').value = '';
}

async function showApp() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('topDate').textContent = new Date().toLocaleDateString('zh-TW');
  await loadAll();
  renderOverview();
}

// ── Data ──
async function loadAll() {
  const [mc, tc, cc] = await Promise.all([
    sb.from('bazi28_members').select('*').order('created_at'),
    sb.from('bazi28_tasks').select('*').order('day_index'),
    sb.from('bazi28_config').select('*').eq('id',1).maybeSingle(),
  ]);
  allMembers = mc.data || [];
  allTasks   = tc.data || [];
  cfg        = cc.data || { start_date: new Date().toISOString().slice(0,10), team_name:'28天品牌故事', expected_members:10 };

  // Populate chat member selector
  const sel = document.getElementById('chatMemberSel');
  sel.innerHTML = '<option value="">— 選擇成員 —</option>' +
    allMembers.map(m => `<option value="${m.id}">${m.name}</option>`).join('');

  // Config fields
  document.getElementById('cfgStartDate').value = cfg.start_date || '';
  document.getElementById('cfgTeamName').value  = cfg.team_name  || '';
  document.getElementById('cfgExpected').value  = cfg.expected_members || 10;
}

// ── Tabs ──
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const tabs = ['overview','members','days','chatlogs','config'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'overview') renderOverview();
  if (tab === 'members')  renderMembers();
  if (tab === 'days')     renderDays();
}

// ── Overview ──
function getDayFromDate(startDate) {
  const start = new Date(startDate + 'T00:00:00');
  const now   = new Date(); now.setHours(0,0,0,0);
  return Math.max(1, Math.min(28, Math.floor((now - start) / 86400000) + 1));
}

function renderOverview() {
  const todayDay  = getDayFromDate(cfg.start_date);
  const totalDone = allTasks.filter(t => t.response).length;
  const totalMem  = allMembers.length;
  const todayDone = allTasks.filter(t => t.day_index === todayDay && t.response).length;

  document.getElementById('todayDayBadge').textContent = 'Day ' + todayDay;

  // Stats
  document.getElementById('statsGrid').innerHTML = [
    { n: totalMem,  l: '總成員數' },
    { n: totalDone, l: '累計完成任務' },
    { n: todayDone, l: '今日完成人數' },
    { n: totalMem > 0 ? Math.round(totalDone / (totalMem * 28) * 100) + '%' : '0%', l: '整體完成率' },
  ].map(s => `<div class="stat-card"><div class="stat-num">${s.n}</div><div class="stat-lbl">${s.l}</div></div>`).join('');

  // Today list
  const todayMemIds = new Set(allTasks.filter(t => t.day_index === todayDay && t.response).map(t => t.member_id));
  const rows = allMembers.map(m => {
    const done = todayMemIds.has(m.id);
    return `<tr>
      <td>${m.name}</td>
      <td><span class="badge ${done?'badge-done':'badge-pending'}">${done?'✅ 已完成':'⏳ 未完成'}</span></td>
      <td>${allTasks.filter(t => t.member_id === m.id && t.response).length} / 28 天</td>
    </tr>`;
  }).join('');

  document.getElementById('todayList').innerHTML = rows
    ? `<table><thead><tr><th>成員</th><th>今日狀態</th><th>累計</th></tr></thead><tbody>${rows}</tbody></table>`
    : '<div class="empty">還沒有成員</div>';
}

// ── Members ──
function renderMembers() {
  document.getElementById('memberDetail').style.display = 'none';
  document.getElementById('memberList').style.display  = 'block';

  const rows = allMembers.map(m => {
    const done = allTasks.filter(t => t.member_id === m.id && t.response).length;
    const pct  = Math.round(done / 28 * 100);
    const bp   = m.bazi_profile;
    return `<tr>
      <td><strong>${m.name}</strong></td>
      <td>${bp ? (bp.selfElem || '—') : '—'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
          <span style="font-size:12px;white-space:nowrap">${done}/28</span>
        </div>
      </td>
      <td>${new Date(m.created_at).toLocaleDateString('zh-TW')}</td>
      <td><button class="link-btn" onclick="openMember('${m.id}')">查看記錄 →</button></td>
    </tr>`;
  }).join('');

  document.getElementById('memberList').innerHTML = `
    <div class="card">
      <div class="card-hd">成員列表（${allMembers.length} 人）</div>
      ${rows
        ? `<table><thead><tr><th>姓名</th><th>日主</th><th>完成進度</th><th>加入日期</th><th></th></tr></thead><tbody>${rows}</tbody></table>`
        : '<div class="empty">還沒有成員</div>'}
    </div>`;
}

function openMember(id) {
  const m = allMembers.find(x => x.id === id);
  if (!m) return;
  document.getElementById('memberList').style.display   = 'none';
  document.getElementById('memberDetail').style.display = 'block';
  document.getElementById('detailName').textContent = m.name;

  const myTasks = allTasks.filter(t => t.member_id === id && t.response).sort((a,b) => a.day_index - b.day_index);
  document.getElementById('detailSub').textContent = `共完成 ${myTasks.length} 天`;

  const TASK_TITLES = {
    1:'旅程起點',2:'你的身份標籤',3:'真正的你',4:'你的隱藏天賦',5:'你的陰影面',6:'核心身份宣言',
    7:'你的表達方式',8:'你的轉折故事',9:'你的迷你課',10:'你的品牌作品',11:'未寄出的信',
    12:'你的隱形資源',13:'重新定義財富',14:'你的時間真相',15:'你的感恩帳',16:'資源槓桿計劃',
    17:'你的影響力時刻',18:'你改變了誰',19:'你的使命召喚',20:'你的核心訊息',21:'影響力宣言',
    22:'改變你的那本書',23:'你的非正式老師',24:'你的直覺',25:'失敗的禮物',26:'智慧傳承',
    27:'28天回望',28:'我的品牌故事',
  };

  document.getElementById('detailSubmissions').innerHTML = myTasks.length
    ? myTasks.map((t,i) => `
        <div class="submission-card" onclick="toggleSub(${i})">
          <div class="sub-day">Day ${t.day_index} · ${new Date(t.completed_at).toLocaleDateString('zh-TW')}</div>
          <div class="sub-title">${TASK_TITLES[t.day_index] || ''}</div>
          <div class="sub-preview">${esc(t.response.slice(0,60))}…</div>
          <div class="sub-full" id="sub${i}">${esc(t.response)}</div>
        </div>`).join('')
    : '<div class="empty">這位成員還沒有提交任何記錄</div>';
}

function toggleSub(i) {
  const el = document.getElementById('sub' + i);
  if (!el) return;
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function closeMemberDetail() {
  document.getElementById('memberDetail').style.display = 'none';
  document.getElementById('memberList').style.display   = 'block';
}

// ── Days ──
function renderDays() {
  const totalMem = allMembers.length || 1;
  const cells = Array.from({ length: 28 }, (_, i) => {
    const d    = i + 1;
    const done = allTasks.filter(t => t.day_index === d && t.response).length;
    const pct  = Math.round(done / totalMem * 100);
    return `<div class="day-cell">
      <div class="dc-num">D${d}</div>
      <div class="dc-pct">${pct}%</div>
      <div class="dc-bar"><div class="dc-bar-fill" style="width:${pct}%"></div></div>
      <div style="font-size:10px;color:#7A6A5A;margin-top:2px">${done}/${totalMem}</div>
    </div>`;
  }).join('');
  document.getElementById('dayGrid').innerHTML = cells;
}

// ── Chat Logs ──
async function loadChatLogs() {
  const memberId = document.getElementById('chatMemberSel').value;
  const el = document.getElementById('chatLogContent');
  if (!memberId) { el.innerHTML = '<div class="empty">請選擇成員查看對話記錄</div>'; return; }
  el.innerHTML = '<div class="empty"><span class="spinner">⏳</span> 載入中…</div>';
  const { data } = await sb.from('bazi28_ai_chats').select('*').eq('member_id', memberId).order('day_index').order('created_at');
  if (!data || data.length === 0) { el.innerHTML = '<div class="empty">還沒有對話記錄</div>'; return; }
  const byDay = {};
  data.forEach(c => { if (!byDay[c.day_index]) byDay[c.day_index] = []; byDay[c.day_index].push(c); });
  el.innerHTML = Object.entries(byDay).map(([day, msgs]) =>
    `<div class="chat-day-sec">
      <div class="chat-day-hd">Day ${day}</div>
      ${msgs.map(c => `<div class="chat-row">
        <span class="chat-role ${c.role === 'user' ? 'user' : 'ai'}">${c.role === 'user' ? '用戶' : 'AI'}</span>
        <span>${esc(c.content)}</span>
      </div>`).join('')}
    </div>`
  ).join('');
}

// ── Config ──
async function saveConfig() {
  const msg = document.getElementById('cfgMsg');
  msg.textContent = '儲存中…';
  const v = {
    id: 1,
    start_date: document.getElementById('cfgStartDate').value,
    team_name:  document.getElementById('cfgTeamName').value.trim(),
    expected_members: parseInt(document.getElementById('cfgExpected').value) || 10,
  };
  const { error } = await sb.from('bazi28_config').upsert(v);
  msg.textContent = error ? '❌ 儲存失敗' : '✅ 已更新！';
  if (!error) { cfg = { ...cfg, ...v }; document.getElementById('topDate').textContent = new Date().toLocaleDateString('zh-TW'); }
}

function savePin() {
  const pin = document.getElementById('newPin').value.trim();
  const msg = document.getElementById('pinMsg');
  if (!/^\d{4,6}$/.test(pin)) { msg.textContent = '❌ PIN 需為 4-6 位數字'; return; }
  localStorage.setItem(ADMIN_PIN_KEY, pin);
  msg.textContent = '✅ PIN 已更新！';
}

// ── Utils ──
function esc(t) {
  return String(t ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
