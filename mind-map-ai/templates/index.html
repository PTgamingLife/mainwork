<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 心智圖內容生成器</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #0f0f1a;
      --bg-panel:   #161627;
      --bg-card:    #1e1e35;
      --bg-hover:   #252540;
      --accent:     #7c6aff;
      --accent2:    #ff6b9d;
      --border:     #2a2a4a;
      --text:       #e0e0f0;
      --text-muted: #7a7a9a;
      --green:      #4ade80;
      --red:        #f87171;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
      background: var(--bg-base);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .logo { font-size: 1.5rem; }
    .header h1 {
      font-size: 1rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-tip {
      margin-left: auto;
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .header-tip kbd {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.68rem;
    }

    /* ── Main Layout ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Mind Map Panel ── */
    .map-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    .toolbar {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .btn {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 5px 11px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      user-select: none;
    }
    .btn:hover { background: var(--bg-hover); border-color: var(--accent); }
    .btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .btn.accent:hover { background: #6a58e8; }
    .btn.danger { border-color: var(--red); color: var(--red); }
    .btn.danger:hover { background: rgba(248,113,113,0.12); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .toolbar-sep { width: 1px; background: var(--border); height: 20px; margin: 0 4px; }
    .toolbar-space { flex: 1; }
    .sel-info { font-size: 0.75rem; color: var(--text-muted); }

    /* ── Canvas ── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: grab;
      background:
        radial-gradient(circle at 50% 50%, rgba(124,106,255,0.04) 0%, transparent 70%),
        linear-gradient(rgba(42,42,74,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42,42,74,0.3) 1px, transparent 1px);
      background-size: auto, 32px 32px, 32px 32px;
    }
    #canvas-wrap.grabbing { cursor: grabbing; }

    #mindmap-svg { width: 100%; height: 100%; display: block; }

    /* ── Inline Edit Input ── */
    .node-input {
      position: absolute;
      display: none;
      border: 2px solid var(--accent);
      border-radius: 7px;
      padding: 0 8px;
      background: var(--bg-base);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      z-index: 200;
      box-shadow: 0 0 12px rgba(124,106,255,0.4);
    }

    /* ── Output Panel ── */
    .out-panel {
      width: 420px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
    }

    .out-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .fmt-row {
      display: flex;
      gap: 6px;
    }
    .fmt-btn {
      flex: 1;
      padding: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      text-align: center;
      transition: all 0.15s;
      user-select: none;
    }
    .fmt-btn:hover { border-color: var(--accent); color: var(--text); }
    .fmt-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    .gen-btn {
      padding: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .gen-btn:hover { opacity: 0.88; }
    .gen-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .out-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }

    .out-placeholder {
      text-align: center;
      padding: 40px 16px;
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.7;
    }
    .out-placeholder .icon { font-size: 2.5rem; margin-bottom: 10px; }

    .out-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-size: 0.85rem;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Markdown rendered styles */
    .out-content h1 { font-size: 1.2rem; color: var(--accent); margin: 0 0 10px; }
    .out-content h2 { font-size: 1rem; color: var(--accent); margin: 14px 0 6px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .out-content h3 { font-size: 0.9rem; color: var(--accent2); margin: 10px 0 4px; }
    .out-content p  { margin-bottom: 8px; }
    .out-content ul, .out-content ol { padding-left: 18px; margin-bottom: 8px; }
    .out-content li { margin-bottom: 3px; }
    .out-content strong { color: #fff; }
    .out-content em { color: var(--accent2); }
    .out-content blockquote { border-left: 3px solid var(--accent); padding-left: 10px; color: var(--text-muted); margin: 8px 0; }
    .out-content code { background: var(--bg-base); padding: 1px 5px; border-radius: 3px; font-size: 0.8rem; }

    .out-footer {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* Error toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--red); color: #fff; padding: 10px 20px;
      border-radius: 8px; font-size: 0.85rem; z-index: 999;
      animation: fadeInUp 0.3s ease;
      display: none;
    }
    .toast.success { background: #16a34a; }
    @keyframes fadeInUp { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

    /* ── Settings Button ── */
    .settings-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .settings-btn:hover { border-color: var(--accent); color: var(--text); background: var(--bg-card); }
    .settings-btn.has-key { border-color: #16a34a; color: #4ade80; }

    /* ── Modal Overlay ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 420px;
      padding: 24px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      transform: translateY(12px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }
    .modal-header h2 { font-size: 1rem; font-weight: 600; flex: 1; }
    .modal-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.2rem; cursor: pointer; padding: 2px 6px;
      border-radius: 4px; transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }

    .modal-status {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 0.82rem;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .status-dot.on  { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .status-dot.off { background: var(--red); }
    .status-label { color: var(--text-muted); }
    .status-masked { color: var(--text); font-family: monospace; font-size: 0.8rem; margin-left: auto; }

    .modal-label {
      font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px;
    }
    .modal-input-wrap {
      display: flex; gap: 6px; margin-bottom: 16px;
    }
    .modal-input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-input.error { border-color: var(--red); }

    .toggle-vis {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      padding: 0 10px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .toggle-vis:hover { border-color: var(--accent); color: var(--text); }

    .modal-error {
      font-size: 0.78rem; color: var(--red);
      margin-bottom: 12px; display: none;
    }
    .modal-error.show { display: block; }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-save {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 8px;
      color: #fff; font-size: 0.85rem; font-weight: 600;
      padding: 8px 20px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: opacity 0.15s;
    }
    .modal-save:hover { opacity: 0.88; }
    .modal-save:disabled { opacity: 0.4; cursor: not-allowed; }
    .modal-cancel {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-muted);
      font-size: 0.85rem; padding: 8px 16px; cursor: pointer;
      transition: all 0.15s;
    }
    .modal-cancel:hover { border-color: var(--accent); color: var(--text); }

    .save-spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    /* ── Project Modal extras ── */
    .proj-save-row {
      display: flex; gap: 6px; margin-bottom: 18px;
    }
    .proj-save-row .modal-input { font-family: inherit; }
    .proj-save-btn {
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-size: 0.82rem; font-weight: 600;
      padding: 0 14px; cursor: pointer; white-space: nowrap;
      transition: opacity 0.15s; flex-shrink: 0;
    }
    .proj-save-btn:hover { opacity: 0.85; }
    .proj-save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .proj-section-title {
      font-size: 0.75rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .proj-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
    .proj-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .proj-item:hover { border-color: var(--accent); }
    .proj-info { flex: 1; min-width: 0; }
    .proj-name { font-size: 0.88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .proj-meta { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
    .proj-actions { display: flex; gap: 5px; flex-shrink: 0; }
    .proj-load-btn {
      background: var(--accent); border: none; border-radius: 6px;
      color: #fff; font-size: 0.75rem; padding: 4px 10px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .proj-load-btn:hover { opacity: 0.8; }
    .proj-del-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; color: var(--red);
      font-size: 0.75rem; padding: 4px 8px; cursor: pointer;
      transition: all 0.15s;
    }
    .proj-del-btn:hover { background: rgba(248,113,113,0.12); border-color: var(--red); }
    .proj-empty { text-align: center; color: var(--text-muted); font-size: 0.82rem; padding: 20px 0; }

    /* ── Attachment toolbar btn ── */
    .btn.attach-active { border-color: #2dd4bf; color: #2dd4bf; }
    .btn.attach-active:hover { background: rgba(45,212,191,0.1); }
  </style>
</head>
<body>

<header class="header">
  <span class="logo">🧠</span>
  <h1>AI 心智圖內容生成器</h1>
  <div class="header-tip">
    <kbd>雙擊</kbd> 編輯節點 &nbsp;
    <kbd>Tab</kbd> 新增子節點 &nbsp;
    <kbd>Enter</kbd> 新增同層 &nbsp;
    <kbd>Del</kbd> 刪除節點 &nbsp;
    <kbd>滾輪</kbd> 縮放
  </div>
  <button class="settings-btn" id="proj-btn" onclick="openProjects()" title="專案管理" style="margin-right:4px">💾</button>
  <button class="settings-btn" id="settings-btn" onclick="openSettings()" title="API 金鑰設定">⚙️</button>
</header>

<!-- ── API Settings Modal ── -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span style="font-size:1.2rem">🔑</span>
      <h2>API 金鑰設定</h2>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>

    <div class="modal-status" id="modal-status">
      <span class="status-dot off" id="status-dot"></span>
      <span class="status-label" id="status-label">尚未設定</span>
      <span class="status-masked" id="status-masked"></span>
    </div>

    <div class="modal-label">Anthropic API 金鑰</div>
    <div class="modal-input-wrap">
      <input class="modal-input" id="api-key-input" type="password"
        placeholder="sk-ant-api03-…" autocomplete="off" spellcheck="false" />
      <button class="toggle-vis" id="toggle-vis" onclick="toggleVisible()" title="顯示/隱藏">👁</button>
    </div>
    <div class="modal-error" id="modal-error"></div>

    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeSettings()">取消</button>
      <button class="modal-save" id="modal-save" onclick="saveApiKey()">
        <div class="save-spinner" id="save-spinner"></div>
        <span id="save-label">儲存</span>
      </button>
    </div>
  </div>
</div>

<!-- ── Project Modal ── -->
<div class="modal-overlay" id="proj-overlay" onclick="handleProjOverlay(event)">
  <div class="modal" style="width:480px">
    <div class="modal-header">
      <span style="font-size:1.2rem">💾</span>
      <h2>專案管理</h2>
      <button class="modal-close" onclick="closeProjects()">✕</button>
    </div>

    <!-- Save new project -->
    <div class="modal-label">儲存目前心智圖為新專案</div>
    <div class="proj-save-row">
      <input class="modal-input" id="proj-name-input" type="text"
        placeholder="輸入專案名稱…" maxlength="60" />
      <button class="proj-save-btn" id="proj-save-btn" onclick="saveProject()">💾 儲存</button>
    </div>

    <!-- Project list -->
    <div class="proj-section-title">已儲存的專案</div>
    <div class="proj-list" id="proj-list">
      <div class="proj-empty" id="proj-empty">尚無儲存的專案</div>
    </div>
  </div>
</div>

<div class="main">

  <!-- ── Mind Map Panel ── -->
  <section class="map-panel">
    <div class="toolbar">
      <button class="btn accent" id="btn-add-child" onclick="addChild()">＋ 子節點</button>
      <button class="btn" id="btn-add-sib" onclick="addSibling()">＋ 同層節點</button>
      <div class="toolbar-sep"></div>
      <button class="btn danger" id="btn-del" onclick="deleteSelected()">🗑 刪除</button>
      <div class="toolbar-sep"></div>
      <button class="btn" onclick="loadTemplate()">📋 範例模板</button>
      <button class="btn" onclick="resetView()">⟲ 重置視圖</button>
      <button class="btn danger" onclick="clearAll()">✕ 清除全部</button>
      <div class="toolbar-sep"></div>
      <button class="btn" id="btn-attach" onclick="triggerAttach()" title="為選取節點附加 .md / .txt 參考文件">📎 附加檔案</button>
      <div class="toolbar-space"></div>
      <span class="sel-info" id="sel-info">點選節點以選取</span>
    </div>
    <input type="file" id="file-input" accept=".md,.txt,.markdown" style="display:none" />
    <div id="canvas-wrap">
      <svg id="mindmap-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <g id="map-root">
          <g id="conn-layer"></g>
          <g id="node-layer"></g>
        </g>
      </svg>
      <input class="node-input" id="node-input" type="text" />
    </div>
  </section>

  <!-- ── Output Panel ── -->
  <aside class="out-panel">
    <div class="out-header">
      <div class="fmt-row">
        <div class="fmt-btn active" id="fmt-md" onclick="setFormat('markdown')">📄 Markdown</div>
        <div class="fmt-btn" id="fmt-txt" onclick="setFormat('text')">📝 純文字</div>
      </div>
      <button class="gen-btn" id="gen-btn" onclick="generateContent()">
        <div class="spinner" id="spinner"></div>
        <span id="gen-label">✨ AI 生成內容</span>
      </button>
    </div>

    <div class="out-body" id="out-body">
      <div class="out-placeholder" id="out-placeholder">
        <div class="icon">📝</div>
        <div>建立心智圖後<br>點擊「AI 生成內容」<br>即可生成完整文章</div>
      </div>
      <div class="out-content" id="out-content" style="display:none"></div>
    </div>

    <div class="out-footer" id="out-footer" style="display:none">
      <button class="btn" onclick="dlFile('md')" id="dl-md">⬇ 下載 .md</button>
      <button class="btn" onclick="dlFile('txt')">⬇ 下載 .txt</button>
      <button class="btn" onclick="copyText()" id="btn-copy">📋 複製</button>
    </div>
  </aside>

</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════
//  Constants & State
// ════════════════════════════════════════
const NW = 130, NH = 36, HGAP = 56, VGAP = 18;

const LEVEL_STYLE = [
  { fill: '#5c3fff', stroke: '#7c6aff', text: '#fff',    fw: '700', fs: 14 },
  { fill: '#1e2a4a', stroke: '#3a4a7a', text: '#d0d0f0', fw: '500', fs: 13 },
  { fill: '#1a1a30', stroke: '#2a2a50', text: '#b0b0d0', fw: '400', fs: 12 },
  { fill: '#161625', stroke: '#222240', text: '#9898b8', fw: '400', fs: 11 },
];

let tree = { id: 'root', text: '主題', children: [] };
let selId = 'root';
let outFmt = 'markdown';
let genText = '';

let tx = 0, ty = 0, sc = 1;
let idCtr = 1;
const gid = () => `n${idCtr++}`;

// ════════════════════════════════════════
//  Layout Engine
// ════════════════════════════════════════
function calcH(node) {
  if (!node.children || !node.children.length) { node._h = NH; return; }
  node.children.forEach(calcH);
  const sum = node.children.reduce((a, c) => a + c._h, 0);
  node._h = Math.max(NH, sum + VGAP * (node.children.length - 1));
}

function placeNodes(node, x, cy, lv) {
  node._x = x; node._y = cy; node._lv = lv;
  if (!node.children || !node.children.length) return;
  let ky = cy - node._h / 2;
  node.children.forEach(c => {
    ky += c._h / 2;
    placeNodes(c, x + NW + HGAP, ky, lv + 1);
    ky += c._h / 2 + VGAP;
  });
}

// ════════════════════════════════════════
//  Rendering
// ════════════════════════════════════════
function render() {
  const svg = document.getElementById('mindmap-svg');
  const W = svg.clientWidth || 900, H = svg.clientHeight || 600;
  calcH(tree);
  placeNodes(tree, 60, H / 2 / sc - ty / sc, 0);

  document.getElementById('conn-layer').innerHTML = '';
  document.getElementById('node-layer').innerHTML = '';
  renderNode(tree, null);
}

function renderNode(node, par) {
  const x = node._x, y = node._y, lv = node._lv;
  const st = LEVEL_STYLE[Math.min(lv, LEVEL_STYLE.length - 1)];
  const isSel = node.id === selId;

  // Connection
  if (par) {
    const px = par._x + NW, py = par._y;
    const mx = (px + x) / 2;
    const path = svgEl('path', {
      d: `M${px},${py} C${mx},${py} ${mx},${y} ${x},${y}`,
      fill: 'none',
      stroke: st.stroke,
      'stroke-width': lv === 1 ? '2' : '1.5',
      opacity: '0.6'
    });
    document.getElementById('conn-layer').appendChild(path);
  }

  // Group
  const g = svgEl('g', {
    transform: `translate(${x},${y - NH / 2})`,
    'data-id': node.id,
    style: 'cursor:pointer'
  });

  // Shadow / glow when selected
  const rect = svgEl('rect', {
    width: NW, height: NH, rx: 8,
    fill: st.fill,
    stroke: isSel ? '#a08fff' : st.stroke,
    'stroke-width': isSel ? '2.5' : '1.5',
    filter: isSel ? 'url(#glow)' : ''
  });
  g.appendChild(rect);

  // Level bar (left accent)
  if (lv > 0) {
    const bar = svgEl('rect', { x: 0, y: 0, width: 3, height: NH, rx: 8, fill: st.stroke, opacity: '0.8' });
    g.appendChild(bar);
  }

  // Text
  const label = node.text.length > 13 ? node.text.slice(0, 12) + '…' : node.text;
  const txt = svgEl('text', {
    x: NW / 2, y: NH / 2,
    'text-anchor': 'middle',
    'dominant-baseline': 'middle',
    fill: st.text,
    'font-size': st.fs,
    'font-weight': st.fw,
    'font-family': '-apple-system, BlinkMacSystemFont, sans-serif',
    style: 'pointer-events:none; user-select:none'
  });
  txt.textContent = label;
  g.appendChild(txt);

  // Child count badge
  if (node.children && node.children.length) {
    const bx = NW - 2, by = NH / 2;
    const bdot = svgEl('circle', { cx: bx + 9, cy: by, r: 8, fill: '#7c6aff', stroke: '#0f0f1a', 'stroke-width': '1.5' });
    const btxt = svgEl('text', {
      x: bx + 9, y: by,
      'text-anchor': 'middle', 'dominant-baseline': 'middle',
      fill: '#fff', 'font-size': '9', 'font-weight': '700',
      style: 'pointer-events:none'
    });
    btxt.textContent = node.children.length;
    g.appendChild(bdot);
    g.appendChild(btxt);
  }

  // Attachment badge (teal dot at top-left)
  if (node.attachment && node.attachment.content) {
    const ab = svgEl('circle', { cx: 7, cy: 7, r: 5, fill: '#2dd4bf', stroke: '#0f0f1a', 'stroke-width': '1.5' });
    const at = svgEl('text', {
      x: 7, y: 7, 'text-anchor': 'middle', 'dominant-baseline': 'middle',
      fill: '#fff', 'font-size': '7', 'font-weight': '700',
      style: 'pointer-events:none'
    });
    at.textContent = '📎';
    g.appendChild(ab);
  }

  g.addEventListener('click',  e => { e.stopPropagation(); select(node.id); });
  g.addEventListener('dblclick', e => { e.stopPropagation(); beginEdit(node); });

  document.getElementById('node-layer').appendChild(g);
  (node.children || []).forEach(c => renderNode(c, node));
}

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

// ════════════════════════════════════════
//  Tree Helpers
// ════════════════════════════════════════
function find(id, node = tree) {
  if (node.id === id) return { node, parent: null };
  for (const c of (node.children || [])) {
    if (c.id === id) return { node: c, parent: node };
    const f = find(id, c);
    if (f) return f;
  }
  return null;
}

function select(id) {
  selId = id;
  const f = find(id);
  if (f) document.getElementById('sel-info').textContent = `已選取：${f.node.text}`;
  render();
  if (typeof updateAttachBtn === 'function') updateAttachBtn();
}

// ════════════════════════════════════════
//  Node Operations
// ════════════════════════════════════════
function addChild() {
  if (!selId) { toast('請先選取節點'); return; }
  const f = find(selId);
  if (!f) return;
  const n = { id: gid(), text: '新節點', children: [] };
  f.node.children = f.node.children || [];
  f.node.children.push(n);
  render();
  select(n.id);
  setTimeout(() => beginEdit(find(n.id).node), 60);
}

function addSibling() {
  if (!selId) { toast('請先選取節點'); return; }
  if (selId === 'root') { addChild(); return; }
  const f = find(selId);
  if (!f || !f.parent) { addChild(); return; }
  const n = { id: gid(), text: '新節點', children: [] };
  const idx = f.parent.children.indexOf(f.node);
  f.parent.children.splice(idx + 1, 0, n);
  render();
  select(n.id);
  setTimeout(() => beginEdit(find(n.id).node), 60);
}

function deleteSelected() {
  if (!selId || selId === 'root') { if (selId === 'root') toast('無法刪除根節點'); return; }
  const f = find(selId);
  if (!f || !f.parent) return;
  f.parent.children.splice(f.parent.children.indexOf(f.node), 1);
  selId = f.parent.id;
  document.getElementById('sel-info').textContent = '點選節點以選取';
  render();
}

function clearAll() {
  if (!confirm('確定要清除所有節點嗎？')) return;
  tree = { id: 'root', text: '主題', children: [] };
  selId = 'root'; idCtr = 1;
  document.getElementById('sel-info').textContent = '點選節點以選取';
  render();
}

// ════════════════════════════════════════
//  Inline Editing
// ════════════════════════════════════════
function beginEdit(node) {
  const inp = document.getElementById('node-input');
  inp.style.left   = (node._x * sc + tx) + 'px';
  inp.style.top    = ((node._y - NH / 2) * sc + ty) + 'px';
  inp.style.width  = (NW * sc) + 'px';
  inp.style.height = (NH * sc) + 'px';
  inp.style.fontSize = (13 * sc) + 'px';
  inp.value = node.text;
  inp.dataset.nid = node.id;
  inp.style.display = 'block';
  inp.focus(); inp.select();

  const finish = () => {
    const v = inp.value.trim();
    if (v) { const f = find(node.id); if (f) f.node.text = v; }
    inp.style.display = 'none';
    render();
  };

  inp.onblur = finish;
  inp.onkeydown = e => {
    if (e.key === 'Enter')  { e.preventDefault(); finish(); }
    if (e.key === 'Escape') { inp.style.display = 'none'; render(); }
    if (e.key === 'Tab')    { e.preventDefault(); finish(); setTimeout(addChild, 60); }
  };
}

// ════════════════════════════════════════
//  Pan & Zoom
// ════════════════════════════════════════
let panning = false, ps = { x: 0, y: 0 };

function applyTransform() {
  document.getElementById('map-root').setAttribute('transform', `translate(${tx},${ty}) scale(${sc})`);
}

function resetView() { tx = 0; ty = 0; sc = 1; applyTransform(); render(); }

document.addEventListener('DOMContentLoaded', () => {
  const wrap = document.getElementById('canvas-wrap');

  wrap.addEventListener('mousedown', e => {
    const t = e.target;
    if (t.closest('#node-layer g')) return;
    panning = true;
    ps = { x: e.clientX - tx, y: e.clientY - ty };
    wrap.classList.add('grabbing');
  });

  document.addEventListener('mousemove', e => {
    if (!panning) return;
    tx = e.clientX - ps.x;
    ty = e.clientY - ps.y;
    applyTransform();
  });

  document.addEventListener('mouseup', () => { panning = false; wrap.classList.remove('grabbing'); });

  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    sc = Math.min(3, Math.max(0.2, sc * factor));
    applyTransform();
  }, { passive: false });

  wrap.addEventListener('click', e => {
    if (!e.target.closest('#node-layer g')) {
      selId = null;
      document.getElementById('sel-info').textContent = '點選節點以選取';
      render();
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
    else if (e.key === 'Tab')   { e.preventDefault(); addChild(); }
    else if (e.key === 'Enter') { e.preventDefault(); addSibling(); }
    else if (e.key === 'F2' && selId) { const f = find(selId); if (f) beginEdit(f.node); }
  });

  window.addEventListener('resize', render);
  loadTemplate();
});

// ════════════════════════════════════════
//  Template
// ════════════════════════════════════════
function loadTemplate() {
  tree = {
    id: 'root', text: '我的主題', children: [
      { id: gid(), text: '第一章節', children: [
        { id: gid(), text: '重點一', children: [] },
        { id: gid(), text: '重點二', children: [] },
      ]},
      { id: gid(), text: '第二章節', children: [
        { id: gid(), text: '概念 A', children: [
          { id: gid(), text: '細節 A1', children: [] },
        ]},
        { id: gid(), text: '概念 B', children: [] },
      ]},
      { id: gid(), text: '第三章節', children: [
        { id: gid(), text: '結論', children: [] },
      ]},
    ]
  };
  selId = 'root';
  render();
  select('root');
}

// ════════════════════════════════════════
//  Format Selection
// ════════════════════════════════════════
function setFormat(fmt) {
  outFmt = fmt;
  document.getElementById('fmt-md').classList.toggle('active', fmt === 'markdown');
  document.getElementById('fmt-txt').classList.toggle('active', fmt === 'text');
  document.getElementById('dl-md').style.display = fmt === 'markdown' ? '' : 'none';
}

// ════════════════════════════════════════
//  AI Generation
// ════════════════════════════════════════
async function generateContent() {
  const btn = document.getElementById('gen-btn');
  const spinner = document.getElementById('spinner');
  const label = document.getElementById('gen-label');
  const ph = document.getElementById('out-placeholder');
  const oc = document.getElementById('out-content');

  btn.disabled = true;
  spinner.style.display = 'block';
  label.textContent = '生成中…';
  ph.style.display = 'none';
  oc.style.display = 'none';

  try {
    const res = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mindMap: tree, format: outFmt })
    });
    const data = await res.json();

    if (data.error) {
      toast(data.error);
      ph.style.display = '';
    } else {
      genText = data.content;
      oc.style.display = '';
      if (outFmt === 'markdown') {
        oc.classList.add('out-content');
        oc.innerHTML = marked.parse(genText);
      } else {
        oc.innerHTML = '';
        oc.textContent = genText;
      }
      document.getElementById('out-footer').style.display = '';
    }
  } catch (err) {
    toast('連線錯誤：' + err.message);
    ph.style.display = '';
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    label.textContent = '✨ AI 生成內容';
  }
}

// ════════════════════════════════════════
//  Download & Copy
// ════════════════════════════════════════
function dlFile(ext) {
  if (!genText) return;
  const blob = new Blob([genText], { type: 'text/plain;charset=utf-8' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `mindmap-content.${ext}`
  });
  a.click();
  URL.revokeObjectURL(a.href);
}

function copyText() {
  if (!genText) return;
  navigator.clipboard.writeText(genText).then(() => {
    const b = document.getElementById('btn-copy');
    b.textContent = '✓ 已複製';
    setTimeout(() => b.textContent = '📋 複製', 2000);
  });
}

// ════════════════════════════════════════
//  Toast
// ════════════════════════════════════════
function toast(msg, type = 'error') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (type === 'success' ? ' success' : '');
  el.style.display = 'block';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.style.display = 'none', 3000);
}

// ════════════════════════════════════════
//  Project Management
// ════════════════════════════════════════
async function openProjects() {
  document.getElementById('proj-overlay').classList.add('open');
  // Prefill name from root node
  const inp = document.getElementById('proj-name-input');
  if (!inp.value) inp.value = tree.text || '';
  await loadProjectsList();
}

function closeProjects() {
  document.getElementById('proj-overlay').classList.remove('open');
}

function handleProjOverlay(e) {
  if (e.target === document.getElementById('proj-overlay')) closeProjects();
}

async function loadProjectsList() {
  const list  = document.getElementById('proj-list');
  const empty = document.getElementById('proj-empty');
  try {
    const res  = await fetch('/projects');
    const data = await res.json();
    // Clear existing items (keep empty placeholder)
    [...list.querySelectorAll('.proj-item')].forEach(el => el.remove());
    if (!data.length) {
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';
    data.forEach(p => {
      const item = document.createElement('div');
      item.className = 'proj-item';
      item.innerHTML = `
        <div class="proj-info">
          <div class="proj-name" title="${esc(p.name)}">📄 ${esc(p.name)}</div>
          <div class="proj-meta">${esc(p.rootText)}　·　${esc(p.updatedAt)}</div>
        </div>
        <div class="proj-actions">
          <button class="proj-load-btn" onclick="loadProject('${p.id}')">載入</button>
          <button class="proj-del-btn"  onclick="deleteProject('${p.id}', this)">刪除</button>
        </div>`;
      list.appendChild(item);
    });
  } catch (err) {
    empty.textContent = '載入失敗：' + err.message;
    empty.style.display = '';
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function saveProject() {
  const name = document.getElementById('proj-name-input').value.trim();
  if (!name) { document.getElementById('proj-name-input').focus(); return; }
  const btn = document.getElementById('proj-save-btn');
  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    const res  = await fetch('/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, tree })
    });
    const data = await res.json();
    if (data.error) { toast(data.error); return; }
    toast(`專案「${name}」已儲存 ✓`, 'success');
    await loadProjectsList();
  } catch (err) {
    toast('儲存失敗：' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '💾 儲存';
  }
}

async function loadProject(id) {
  try {
    const res  = await fetch(`/projects/${id}`);
    const data = await res.json();
    if (data.error) { toast(data.error); return; }
    tree  = data.tree;
    selId = 'root'; idCtr = 1;
    render(); select('root');
    closeProjects();
    toast(`已載入：${data.name}`, 'success');
  } catch (err) {
    toast('載入失敗：' + err.message);
  }
}

async function deleteProject(id, btn) {
  if (!confirm('確定刪除此專案？')) return;
  btn.disabled = true;
  try {
    await fetch(`/projects/${id}`, { method: 'DELETE' });
    await loadProjectsList();
  } catch (err) {
    toast('刪除失敗：' + err.message);
    btn.disabled = false;
  }
}

// ════════════════════════════════════════
//  Node File Attachment
// ════════════════════════════════════════
function triggerAttach() {
  if (!selId) { toast('請先選取節點'); return; }
  document.getElementById('file-input').value = '';
  document.getElementById('file-input').click();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file || !selId) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const f = find(selId);
      if (!f) return;
      f.node.attachment = { name: file.name, content: ev.target.result };
      render();
      // Update attach button style
      updateAttachBtn();
      toast(`已附加「${file.name}」到節點「${f.node.text}」`, 'success');
    };
    reader.readAsText(file, 'utf-8');
  });
});

function updateAttachBtn() {
  const btn = document.getElementById('btn-attach');
  if (!selId) { btn.classList.remove('attach-active'); btn.title = '附加 .md / .txt 參考文件（請先選取節點）'; return; }
  const f = find(selId);
  const hasAtt = f && f.node.attachment && f.node.attachment.content;
  btn.classList.toggle('attach-active', !!hasAtt);
  btn.title = hasAtt ? `已附加：${f.node.attachment.name}（點擊可更換）` : '為選取節點附加 .md / .txt 參考文件';
  btn.textContent = hasAtt ? `📎 ${f.node.attachment.name}` : '📎 附加檔案';
}

// ════════════════════════════════════════
//  API Settings Modal
// ════════════════════════════════════════
async function openSettings() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('api-key-input').value = '';
  setModalError('');
  await refreshKeyStatus();
}

function closeSettings() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeSettings();
}

function toggleVisible() {
  const inp = document.getElementById('api-key-input');
  const btn = document.getElementById('toggle-vis');
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  btn.textContent = isHidden ? '🙈' : '👁';
}

function setModalError(msg) {
  const el = document.getElementById('modal-error');
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
  document.getElementById('api-key-input').classList.toggle('error', !!msg);
}

async function refreshKeyStatus() {
  try {
    const res = await fetch('/api-key/status');
    const data = await res.json();
    const dot    = document.getElementById('status-dot');
    const label  = document.getElementById('status-label');
    const masked = document.getElementById('status-masked');
    const btn    = document.getElementById('settings-btn');
    if (data.configured) {
      dot.className   = 'status-dot on';
      label.textContent = '已設定';
      masked.textContent = data.masked;
      btn.classList.add('has-key');
    } else {
      dot.className   = 'status-dot off';
      label.textContent = '尚未設定';
      masked.textContent = '';
      btn.classList.remove('has-key');
    }
  } catch (_) {}
}

async function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { setModalError('請輸入 API 金鑰'); return; }

  const saveBtn    = document.getElementById('modal-save');
  const saveSpinner = document.getElementById('save-spinner');
  const saveLabel  = document.getElementById('save-label');
  saveBtn.disabled = true;
  saveSpinner.style.display = 'block';
  saveLabel.textContent = '驗證中…';
  setModalError('');

  try {
    const res  = await fetch('/api-key', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key })
    });
    const data = await res.json();
    if (data.error) {
      setModalError(data.error);
    } else {
      await refreshKeyStatus();
      closeSettings();
      toast('API 金鑰已儲存 ✓', 'success');
    }
  } catch (err) {
    setModalError('連線錯誤：' + err.message);
  } finally {
    saveBtn.disabled = false;
    saveSpinner.style.display = 'none';
    saveLabel.textContent = '儲存';
  }
}

// Esc closes modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSettings();
});

// Init: check key status on load
document.addEventListener('DOMContentLoaded', () => { refreshKeyStatus(); });
</script>
