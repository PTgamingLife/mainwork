<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>28天衝刺挑戰 ⭐</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- 背景印花層（獎杯/星星/太陽） -->
  <div class="bg-motifs" id="bgMotifs" aria-hidden="true"></div>

  <!-- ===== 登入畫面 ===== -->
  <div class="overlay" id="loginOverlay">
    <div class="login-card pop-in">
      <div class="login-emblem">🏆</div>
      <h1 class="login-title">28天衝刺挑戰</h1>
      <p class="login-sub" id="loginTeamName">業務團隊・20 位顧客</p>
      <div class="field">
        <label>你的名字</label>
        <input id="loginName" type="text" maxlength="12" placeholder="輸入暱稱，例如：小柏" autocomplete="off" />
      </div>
      <div class="field">
        <label>4 位數 PIN 密碼</label>
        <input id="loginPin" type="tel" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off" />
      </div>
      <p class="login-hint">第一次輸入即建立帳號並設定 PIN；之後請用同一組登入。</p>
      <button class="btn btn-primary btn-block" id="loginBtn"><span>進入挑戰</span></button>
      <p class="login-msg" id="loginMsg"></p>
      <button class="link-btn" id="openAdminFromLogin">🔐 管理員後台</button>
    </div>
  </div>

  <!-- ===== 主 App ===== -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar-left">
        <span class="brand">⭐ 衝刺挑戰</span>
        <span class="team-chip" id="teamChip">團隊</span>
      </div>
      <div class="topbar-right">
        <span class="day-badge" id="dayBadge">Day 1</span>
        <button class="icon-btn" id="adminGear" title="管理員">⚙️</button>
        <button class="icon-btn" id="logoutBtn" title="登出">🚪</button>
      </div>
    </header>

    <main class="pages">
      <!-- 第1頁：每日主題 -->
      <section class="page" id="page-theme"></section>
      <!-- 第2頁：愛心漂浮 -->
      <section class="page hidden" id="page-hearts"></section>
      <!-- 第3頁：每日任務計分 -->
      <section class="page hidden" id="page-tasks"></section>
      <!-- 第4頁：名單彙整 -->
      <section class="page hidden" id="page-lists"></section>
      <!-- 第5頁：小老師 -->
      <section class="page hidden" id="page-coach"></section>
    </main>

    <nav class="tabbar">
      <button class="tab active" data-page="theme"><span class="tab-ico">🎯</span><span>主題</span></button>
      <button class="tab" data-page="hearts"><span class="tab-ico">💗</span><span>愛心</span></button>
      <button class="tab" data-page="tasks"><span class="tab-ico">📝</span><span>任務</span></button>
      <button class="tab" data-page="lists"><span class="tab-ico">📋</span><span>名單</span></button>
      <button class="tab" data-page="coach"><span class="tab-ico">🧑‍🏫</span><span>小老師</span></button>
    </nav>
  </div>

  <!-- ===== 管理員後台 ===== -->
  <div class="overlay hidden" id="adminOverlay">
    <div class="admin-card pop-in" id="adminCard"></div>
  </div>

  <!-- ===== 通用 Modal（愛心稱讚等） ===== -->
  <div class="overlay hidden" id="modalOverlay">
    <div class="modal-card pop-in" id="modalCard"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/hearts.js"></script>
  <script src="js/coach.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
