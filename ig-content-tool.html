<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG 內容工廠 · ailifeu</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #24243a;
    --accent: #7c6af7;
    --accent2: #f97b6b;
    --text: #e8e8f0;
    --muted: #888;
    --border: #2e2e44;
    --success: #4ade80;
    --tag-bg: #2a2a3e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* ── Layout ── */
  .app { max-width: 820px; margin: 0 auto; padding: 24px 16px 80px; }
  .header { text-align: center; padding: 32px 0 24px; }
  .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }
  .header .date { color: var(--muted); font-size: .85rem; margin-top: 6px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .tab { padding: 10px 20px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: .9rem; color: var(--muted); border: 1px solid transparent; border-bottom: none; transition: all .15s; }
  .tab.active { color: var(--text); background: var(--surface); border-color: var(--border); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Topic Cards ── */
  .topics-grid { display: flex; flex-direction: column; gap: 14px; }
  .topic-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; cursor: pointer; transition: border-color .15s, transform .1s; }
  .topic-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .topic-card.selected { border-color: var(--accent); background: var(--surface2); }
  .topic-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag { background: var(--tag-bg); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .tag.style { color: var(--accent2); }
  .topic-hook { font-size: 1.05rem; font-weight: 600; line-height: 1.5; }
  .topic-hook .adapted { display: block; font-size: .75rem; color: var(--success); margin-top: 6px; font-weight: 400; }
  .regen-btn { margin-top: 20px; width: 100%; padding: 12px; background: transparent; border: 1px dashed var(--border); border-radius: 10px; color: var(--muted); cursor: pointer; font-size: .85rem; transition: all .15s; }
  .regen-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Detail Panel ── */
  .detail { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
  .detail-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
  .back-btn { background: var(--tag-bg); border: none; color: var(--text); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: .85rem; white-space: nowrap; }
  .detail-title { font-size: 1.1rem; font-weight: 700; line-height: 1.4; }

  .section { margin-bottom: 22px; }
  .section-label { font-size: .75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  .hook-box { background: var(--surface2); border-left: 3px solid var(--accent); padding: 14px 16px; border-radius: 0 8px 8px 0; font-size: 1rem; font-weight: 600; line-height: 1.5; }

  .structure { list-style: none; counter-reset: step; }
  .structure li { counter-increment: step; display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: .9rem; line-height: 1.5; }
  .structure li:last-child { border-bottom: none; }
  .structure li::before { content: counter(step); background: var(--accent); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; flex-shrink: 0; margin-top: 1px; }

  .caption-box { background: var(--surface2); border-radius: 8px; padding: 14px 16px; font-size: .9rem; line-height: 1.7; white-space: pre-wrap; }
  .cta-box { display: flex; gap: 8px; flex-wrap: wrap; }
  .cta-item { background: var(--tag-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: .85rem; }

  /* ── Edit Field ── */
  .edit-section { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
  .edit-label { font-size: .85rem; color: var(--muted); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .edit-label span { font-size: .75rem; color: var(--success); opacity: 0; transition: opacity .3s; }
  .edit-label span.show { opacity: 1; }
  textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 14px; font-size: .9rem; line-height: 1.6; resize: vertical; min-height: 140px; font-family: inherit; }
  textarea:focus { outline: none; border-color: var(--accent); }
  .save-btn { margin-top: 10px; background: var(--accent); border: none; color: white; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: .9rem; font-weight: 600; transition: opacity .15s; }
  .save-btn:hover { opacity: .85; }

  /* ── Style Memory Panel ── */
  .memory-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
  .memory-panel h2 { font-size: 1rem; margin-bottom: 6px; }
  .memory-panel p { font-size: .85rem; color: var(--muted); margin-bottom: 20px; }

  .style-profile { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .style-stat { background: var(--surface2); border-radius: 10px; padding: 14px; }
  .style-stat .label { font-size: .75rem; color: var(--muted); margin-bottom: 6px; }
  .style-stat .value { font-size: 1.1rem; font-weight: 700; color: var(--accent); }

  .edit-history { }
  .history-item { background: var(--surface2); border-radius: 10px; padding: 14px; margin-bottom: 10px; border-left: 3px solid var(--border); }
  .history-item.has-edit { border-left-color: var(--accent2); }
  .history-meta { font-size: .75rem; color: var(--muted); margin-bottom: 6px; display: flex; gap: 8px; flex-wrap: wrap; }
  .history-content { font-size: .85rem; line-height: 1.6; white-space: pre-wrap; }
  .clear-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: .8rem; margin-top: 16px; }
  .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: .9rem; }

  /* ── Insight Box ── */
  .insight-box { background: linear-gradient(135deg, #1e1a3a, #2a1a2e); border: 1px solid #3d2a5e; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; }
  .insight-box h3 { font-size: .85rem; color: #b89af7; margin-bottom: 8px; }
  .insight-box ul { list-style: none; }
  .insight-box ul li { font-size: .85rem; color: var(--text); padding: 3px 0; line-height: 1.5; }
  .insight-box ul li::before { content: "→ "; color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>IG 內容工廠 <span>·</span> ailifeu</h1>
    <div class="date" id="today-date"></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('topics')">今日主題</div>
    <div class="tab" onclick="switchTab('detail')" id="tab-detail" style="display:none">內容單元</div>
    <div class="tab" onclick="switchTab('memory')">語氣記憶</div>
  </div>

  <!-- Topics Panel -->
  <div class="tab-panel active" id="panel-topics">
    <div class="topics-grid" id="topics-container"></div>
    <button class="regen-btn" onclick="regenTopics()">↻ 重新抽取今日三主題</button>
  </div>

  <!-- Detail Panel -->
  <div class="tab-panel" id="panel-detail">
    <div class="detail">
      <div class="detail-header">
        <button class="back-btn" onclick="switchTab('topics')">← 返回</button>
        <div class="detail-title" id="detail-title"></div>
      </div>
      <div id="detail-body"></div>

      <div class="edit-section">
        <div class="edit-label">
          ✏️ 修改這篇內容（系統會從你的修改中學習語氣）
          <span id="save-indicator">已儲存 ✓</span>
        </div>
        <textarea id="edit-area" placeholder="把上方的 Hook 或 Caption 複製過來，修改成你自己的語氣…"></textarea>
        <button class="save-btn" onclick="saveEdit()">儲存修改</button>
      </div>
    </div>
  </div>

  <!-- Memory Panel -->
  <div class="tab-panel" id="panel-memory">
    <div class="memory-panel">
      <h2>🧠 你的語氣風格學習記錄</h2>
      <p>系統從你的修改歷史中分析語氣偏好，下次產生內容時自動套用。</p>
      <div id="style-profile-container"></div>
      <div id="edit-history-container"></div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
//  DATA: Themes × Styles Matrix
// ─────────────────────────────────────────
const THEMES = [
  { id: 'ai-tools', name: 'AI 工具實測', emoji: '🤖', pain: '花了錢買 AI 工具，根本不知道怎麼用' },
  { id: 'workflow',  name: '工作流程自動化', emoji: '⚡', pain: '重複的事做到想哭，卻不知道能自動化' },
  { id: 'health',   name: '健康管理 × 科技', emoji: '🏥', pain: '知道要健康，但沒時間，也沒方法' },
  { id: 'dad-life', name: '中年工程師奶爸', emoji: '👨‍👧', pain: '又要搞程式又要帶小孩，人生很崩潰' },
  { id: 'ai-edu',   name: 'AI 教學入門', emoji: '📚', pain: '想學 AI 但感覺好難，不知從哪開始' },
  { id: 'anti-guru', name: '破解 AI 迷思', emoji: '🔥', pain: '到處都是 AI 大師，說的都不接地氣' },
];

const STYLES = [
  { id: 'action',      name: '行動指南', tag: '方法型',    formula: 'N 個步驟讓你達到{成果}' },
  { id: 'story',       name: '故事型',   tag: '共鳴型',    formula: '我曾經{痛點}，直到我改了一件事' },
  { id: 'contrarian',  name: '反向思考', tag: '反骨型',    formula: '停止做{常見建議}，它正在害你' },
  { id: 'data',        name: '數據分析', tag: '數據型',    formula: '90% 的人不知道的{指標}' },
  { id: 'list',        name: '清單收藏', tag: '工具型',    formula: '每個{族群}必備的 N 個{資源}' },
  { id: 'motivation',  name: '動機激勵', tag: '心態型',    formula: '你不缺{資源}，你缺的是{觀念}' },
];

// Content templates indexed by theme + style
const CONTENT_MAP = {
  'ai-tools+action': {
    hook: '3 個步驟，讓你花 5 分鐘搞懂一個新 AI 工具（不用看一小時教學）',
    structure: [
      '先問它「你能幫我做什麼？」— 讓 AI 自我介紹，節省你 80% 摸索時間',
      '給它你的真實情境，看它能不能解決你「今天的問題」',
      '找它的邊界：故意問超綱問題，了解它的限制，避免誤用',
    ],
    caption: `你有沒有試過一個 AI 工具，用了三天卻完全搞不清楚它到底能做什麼？

我也有過這個問題。

後來我發現：問題不在工具難用，在於我們根本沒有「快速上手的框架」。

現在每次我遇到新工具，都用這 3 步驟：
→ 先讓它自介
→ 再用真實案例測試
→ 最後找它的極限

10 分鐘就能判斷這個工具值不值得繼續用。`,
    cta: ['儲存起來下次用 🔖', '你最近試了什麼 AI 工具？', '分享給也在找工具的朋友'],
    format: '輪播貼文',
    signal: 'Saves（工具性價值）',
  },
  'ai-tools+story': {
    hook: '我花了 3 個月試了 27 個 AI 工具，最後只留下 4 個',
    structure: [
      '當初的痛點：每週花 6 小時寫內容，身心俱疲',
      '踩雷過程：試了很多「大師推薦」的工具，大多用了一次就刪',
      '轉折點：發現工具好不好用，取決於它能不能融入你的工作流',

    ],
    caption: `老實說，我剛開始用 AI 工具的時候，每個月都在追新工具。

「這個工具能幫我省超過 30 分鐘嗎？」

通不過就砍。

最後留下來的 4 個，每天都在用。`,
    cta: ['留言告訴我你最離不開哪個 AI 工具', '分享給也在追工具的朋友 👥'],
    format: 'Reels 或輪播',
    signal: 'DMs + Shares（共鳴型）',

  'ai-tools+contrarian': {

      '常見迷思：工具越多 = 越有生產力',
      '真相：工具切換成本每天吃掉你 90 分鐘',

    ],
    caption: `我說一個可能讓你不舒服的觀察：

追 AI 工具最積極的人，往往生產力最低。

不是因為工具不好，是因為他們在用「找工具」這個行為逃避真正的工作。

工具是解法，不是目標。
先搞清楚你要解決什麼問題，再找工具。`,
    cta: ['你同意嗎？留言開戰 👇', '轉發給那個每天推薦新工具的朋友 😅'],
    format: 'Reels',
    signal: 'Shares + Comments（反骨爭議型）',

  'ai-tools+data': {
    hook: '用 AI 工具超過 1 年的人，平均每週省了幾小時？數字嚇到我了',
    structure: [

問題不是「AI 能省時嗎」，而是「你有沒有在系統性地用它」。`,

避免我再次浪費訂閱費。

存起來，下次你遇到「要不要買」的時刻就用得到。`,

    format: '輪播貼文',

    cta: ['這句話存起來 💡', '你目前主力在用哪個工具？'],
    format: '純文字 Reel 或單圖',

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let currentTopic = null;
let regenCount = 0;

function getStorage(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
}
function setStorage(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

// ─────────────────────────────────────────
//  SEEDED RANDOM (date + regenCount)
// ─────────────────────────────────────────
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function getTodaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate() + regenCount * 9999;
}

function pickDailyTopics() {
  const rand = seededRandom(getTodaySeed());
  const pairs = [];
  const usedThemes = new Set();
  const usedStyles = new Set();
  const allKeys = Object.keys(CONTENT_MAP);

  // Shuffle allKeys with seeded rand
  const shuffled = allKeys.slice().sort(() => rand() - 0.5);

  for (const key of shuffled) {
    const [themeId, styleId] = key.split('+');
    if (!usedThemes.has(themeId) && !usedStyles.has(styleId)) {
      pairs.push(key);
      usedThemes.add(themeId);
      usedStyles.add(styleId);
      if (pairs.length === 3) break;
    }
  }
  // Fallback if not enough variety
  while (pairs.length < 3) {
    const key = shuffled[pairs.length];
    if (!pairs.includes(key)) pairs.push(key);
  }
  return pairs.slice(0, 3);
}

// ─────────────────────────────────────────
//  STYLE ANALYSIS (from edit history)
// ─────────────────────────────────────────
function analyzeStyle() {
  const history = getStorage('editHistory', []);
  if (history.length === 0) return null;

  const allText = history.map(h => h.editedText).join('\n');
  const wordCount = allText.split(/\s+/).filter(Boolean).length;

  // Simple heuristics
  const hasCasual = (allText.match(/哈|笑死|真的|超|根本|欸/g) || []).length;
  const hasEmoji = (allText.match(/[\u{1F000}-\u{1FFFF}]|[☀-⟿]/gu) || []).length;
  const hasBullets = (allText.match(/^[→•\-\*]/gm) || []).length;
  const hasNumbers = (allText.match(/\d+/g) || []).length;
  const avgSentenceLen = allText.split(/[。！？\n]/).filter(s => s.trim().length > 0)
    .reduce((sum, s, _, arr) => sum + s.length / arr.length, 0);

  const tone = hasCasual > 3 ? '口語親切' : avgSentenceLen < 20 ? '簡潔有力' : '知識型深度';
  const emojiFreq = hasEmoji > 10 ? '大量' : hasEmoji > 3 ? '適度' : '少用';
  const structure = hasBullets > 5 ? '條列式' : '段落敘述';

  return { tone, emojiFreq, structure, editCount: history.length, wordCount };
}

function getStyleHint(topicKey) {
  const profile = analyzeStyle();
  if (!profile || profile.editCount < 2) return null;
  const hints = [];
  if (profile.tone === '口語親切') hints.push('語氣更口語化');
  if (profile.tone === '簡潔有力') hints.push('句子更短更有力');
  if (profile.emojiFreq === '大量') hints.push('加入更多 Emoji');
  if (profile.emojiFreq === '少用') hints.push('Emoji 減少');
  if (profile.structure === '條列式') hints.push('改為條列格式');
  return hints.length ? `根據你的修改習慣：${hints.join('、')}` : null;
}

// ─────────────────────────────────────────
//  RENDER: Topic Cards
// ─────────────────────────────────────────
function renderTopics() {
  const keys = pickDailyTopics();
  const container = document.getElementById('topics-container');
  container.innerHTML = '';

  keys.forEach((key, i) => {
    const [themeId, styleId] = key.split('+');
    const theme = THEMES.find(t => t.id === themeId);
    const style = STYLES.find(s => s.id === styleId);
    const content = CONTENT_MAP[key];
    const hint = getStyleHint(key);

    const card = document.createElement('div');
    card.className = 'topic-card';
    card.innerHTML = `
      <div class="topic-meta">
        <span class="tag">${theme.emoji} ${theme.name}</span>
        <span class="tag style">${style.tag}</span>
        <span class="tag" style="color:var(--muted);">${content.format}</span>
      </div>
      <div class="topic-hook">
        ${content.hook}
        ${hint ? `<span class="adapted">✨ ${hint}</span>` : ''}
      </div>
    `;
    card.onclick = () => showDetail(key);
    container.appendChild(card);
  });
}

// ─────────────────────────────────────────
//  RENDER: Detail
// ─────────────────────────────────────────
function showDetail(key) {
  currentTopic = key;
  const [themeId, styleId] = key.split('+');
  const theme = THEMES.find(t => t.id === themeId);
  const style = STYLES.find(s => s.id === styleId);
  const c = CONTENT_MAP[key];

  document.getElementById('detail-title').textContent = `${theme.emoji} ${theme.name} × ${style.name}`;

  const saved = getStorage('editHistory', []).find(h => h.key === key);

  document.getElementById('detail-body').innerHTML = `
    <div class="section">
      <div class="section-label">🎯 Hook（開場勾子）</div>
      <div class="hook-box">${c.hook}</div>
    </div>

    <div class="section">
      <div class="section-label">📐 內容結構</div>
      <ol class="structure">
        ${c.structure.map(s => `<li>${s}</li>`).join('')}
      </ol>
    </div>

    <div class="section">
      <div class="section-label">📝 Caption 草稿</div>
      <div class="caption-box">${c.caption}</div>
    </div>

    <div class="section">
      <div class="section-label">📢 CTA 選項</div>
      <div class="cta-box">
        ${c.cta.map(t => `<div class="cta-item">${t}</div>`).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-label">📊 演算法訊號目標</div>
      <div class="cta-item" style="display:inline-block">${c.signal}</div>
    </div>
  `;

  document.getElementById('edit-area').value = saved ? saved.editedText : '';
  document.getElementById('save-indicator').classList.remove('show');

  document.getElementById('tab-detail').style.display = '';
  switchTab('detail');
}

// ─────────────────────────────────────────
//  SAVE EDIT
// ─────────────────────────────────────────
function saveEdit() {
  if (!currentTopic) return;
  const text = document.getElementById('edit-area').value.trim();
  if (!text) return;

  const history = getStorage('editHistory', []);
  const existing = history.findIndex(h => h.key === currentTopic);
  const entry = {
    key: currentTopic,
    editedText: text,
    timestamp: new Date().toISOString(),
  };

  if (existing >= 0) history[existing] = entry;
  else history.push(entry);

  setStorage('editHistory', history);

  const ind = document.getElementById('save-indicator');
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 2500);

  // Re-render topics to update style hints
  renderTopics();
}

// ─────────────────────────────────────────
//  RENDER: Memory Panel
// ─────────────────────────────────────────
function renderMemory() {
  const history = getStorage('editHistory', []);
  const profile = analyzeStyle();

  const profileContainer = document.getElementById('style-profile-container');
  const histContainer = document.getElementById('edit-history-container');

  if (profile) {
    profileContainer.innerHTML = `
      <div class="insight-box">
        <h3>✨ 系統偵測到你的語氣風格</h3>
        <ul>
          <li>語氣傾向：<strong>${profile.tone}</strong></li>
          <li>Emoji 使用頻率：<strong>${profile.emojiFreq}</strong></li>
          <li>文章結構：<strong>${profile.structure}</strong></li>
          <li>已儲存修改：<strong>${profile.editCount} 篇</strong></li>
        </ul>
      </div>
      <div class="style-profile">
        <div class="style-stat"><div class="label">累積修改篇數</div><div class="value">${profile.editCount}</div></div>
        <div class="style-stat"><div class="label">語氣風格</div><div class="value" style="font-size:.9rem">${profile.tone}</div></div>
        <div class="style-stat"><div class="label">文字量</div><div class="value">${profile.wordCount}</div></div>
        <div class="style-stat"><div class="label">結構偏好</div><div class="value" style="font-size:.9rem">${profile.structure}</div></div>
      </div>
    `;
  } else {
    profileContainer.innerHTML = `
      <div class="insight-box">
        <h3>📌 語氣學習還未啟動</h3>
        <ul><li>請先選擇一個主題，修改內容後儲存，系統會開始學習你的語氣。</li></ul>
      </div>
    `;
  }

  if (history.length === 0) {
    histContainer.innerHTML = `<div class="empty-state">還沒有修改記錄<br>點選主題 → 修改 → 儲存，語氣記憶就會累積在這裡</div>`;
    return;
  }

  histContainer.innerHTML = `
    <div class="section-label" style="margin-bottom:12px">修改歷史</div>
    ${history.slice().reverse().map(h => {
      const [themeId, styleId] = h.key.split('+');
      const theme = THEMES.find(t => t.id === themeId);
      const style = STYLES.find(s => s.id === styleId);
      const d = new Date(h.timestamp);
      return `
        <div class="history-item has-edit">
          <div class="history-meta">
            <span>${theme?.emoji} ${theme?.name}</span>
            <span>${style?.name}</span>
            <span>${d.toLocaleDateString('zh-TW')} ${d.toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'})}</span>
          </div>
          <div class="history-content">${h.editedText}</div>
        </div>
      `;
    }).join('')}
    <button class="clear-btn" onclick="clearHistory()">清除所有記錄</button>
  `;
}

function clearHistory() {
  if (confirm('確定要清除所有修改記錄嗎？語氣學習將重置。')) {
    setStorage('editHistory', []);
    renderMemory();
    renderTopics();
  }
}

// ─────────────────────────────────────────
//  TABS
// ─────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

  const tabMap = { topics: 0, detail: 1, memory: 2 };
  document.querySelectorAll('.tab')[tabMap[name]]?.classList.add('active');
  document.getElementById(`panel-${name}`)?.classList.add('active');

  if (name === 'memory') renderMemory();
}

function regenTopics() {
  regenCount++;
  renderTopics();
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
(function init() {
  const d = new Date();
  document.getElementById('today-date').textContent =
    `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日 · 今日主題已就緒`;
  renderTopics();
})();
</script>
