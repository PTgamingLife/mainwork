<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>開心農場 · 三方贊助採收 🥬</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    font-family: "Segoe UI", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    user-select: none; background: #cde7bd;
  }
  #scene {
    position: fixed; inset: 0;
    background-color: #c7e6b4;
    background-image:
      linear-gradient(rgba(0,0,0,0) 60%, rgba(0,30,0,0.18) 100%),
      url("https://d8j0ntlcm91z4.cloudfront.net/user_3E8E7dfEkimdmsd0LdokMgNgQuE/hf_20260630_051943_5813a8e8-fef0-4062-aba4-28cbc2a0b441.png");
    background-size: cover; background-position: center; background-repeat: no-repeat;
  }
  #scene.fallback {
    background-image:
      radial-gradient(120% 90% at 50% 0%, #bfe7ff 0%, #cdeeb6 45%, #8c5a36 46%, #6e4326 100%);
  }

  /* ===== HUD:三個贊助商 ===== */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; gap: 8px; justify-content: center; align-items: stretch;
    padding: 10px 8px; flex-wrap: wrap; pointer-events: none;
  }
  .sponsor {
    background: rgba(255,255,255,0.94);
    border-radius: 16px; padding: 6px 14px; min-width: 92px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    border-bottom: 5px solid var(--c);
    text-align: center;
  }
  .sponsor .name { font-weight: 800; font-size: clamp(13px, 3.6vw, 17px); color: var(--c); display:flex; align-items:center; gap:5px; justify-content:center;}
  .sponsor .cnt { font-weight: 900; font-size: clamp(20px, 6vw, 30px); color: #333; line-height: 1.1; }
  .sponsor .lbl { font-size: 11px; color: #888; }

  #title {
    position: fixed; bottom: 12px; left: 0; right: 0; text-align: center;
    color: #fff; font-weight: 800; font-size: clamp(12px, 3.4vw, 17px);
    text-shadow: 0 2px 6px rgba(0,0,0,0.6); z-index: 30; pointer-events: none;
  }
  #reset {
    position: fixed; right: 10px; bottom: 40px; z-index: 31; pointer-events: auto;
    background: #ffb300; color: #5a3d00; border: 3px solid #fff;
    box-shadow: 0 4px 0 rgba(0,0,0,0.2); border-radius: 999px;
    padding: 8px 14px; font-weight: 800; font-size: clamp(13px, 3.4vw, 18px); cursor: pointer;
  }
  #reset:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }

  /* ===== 等角田地 ===== */
  #board { position: fixed; left: 0; top: 0; z-index: 10; }
  .cell { position: absolute; }

  /* 菱形土地方塊 */
  .plot {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background:
      linear-gradient(180deg, #8a5a34, #6e4426);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    box-shadow: inset 0 0 0 3px var(--c);
  }
  .plot::after { /* 土壤紋理高光 */
    content:""; position:absolute; inset:14% 8%;
    background: repeating-linear-gradient(135deg, rgba(0,0,0,0.06) 0 6px, rgba(255,255,255,0.04) 6px 12px);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  }

  /* 蔬菜(站在方塊中央,永遠存在) */
  .crop {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -72%);
    cursor: pointer;
  }
  .crop svg { display:block; width:100%; height:100%; overflow: visible; }
  .leaf { transform-origin: 50% 92%; transition: transform .5s cubic-bezier(.34,1.56,.64,1); }
  .crop.sprout  .leaf { transform: scale(.32); }
  .crop.growing .leaf { transform: scale(.62); }
  .crop.ready   .leaf { transform: scale(1); }
  .crop.ready { filter: drop-shadow(0 0 0 rgba(255,255,150,0)); animation: glow 1.8s ease-in-out infinite; }
  @keyframes glow {
    0%,100% { filter: drop-shadow(0 0 2px rgba(255,255,150,.5)); }
    50%     { filter: drop-shadow(0 0 12px rgba(255,255,120,.95)); }
  }
  .crop.ready:hover { transform: translate(-50%, -76%) scale(1.06); }

  .pop {
    position: fixed; z-index: 40; pointer-events: none;
    font-weight: 900; font-size: 24px;
    text-shadow: 0 2px 4px rgba(0,0,0,.45);
    animation: floatUp .9s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { transform: translate(-50%,-50%) scale(.6); opacity: 0; }
    20%  { transform: translate(-50%,-95%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%,-165%) scale(1); opacity: 0; }
  }

  #hint {
    position: fixed; inset: 0; z-index: 50; display:flex;
    align-items:center; justify-content:center; flex-direction:column;
    background: rgba(0,0,0,0.4); color:#fff; text-align:center; padding:24px;
    transition: opacity .4s ease;
  }
  #hint h1 { font-size: clamp(26px,8vw,52px); margin:0 0 8px; text-shadow:0 3px 10px rgba(0,0,0,.6); }
  #hint p { font-size: clamp(14px,4.2vw,21px); margin:4px 0; opacity:.95; }
  #hint .play {
    margin-top:22px; background:#6fbf3a; color:#fff; border:4px solid #fff;
    box-shadow:0 6px 0 rgba(0,0,0,0.25); border-radius:999px;
    padding:14px 40px; font-weight:900; font-size:clamp(18px,5vw,26px); cursor:pointer;
  }
  #hint .play:active { transform: translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,0.25); }
  #hint.hide { opacity:0; pointer-events:none; }
  #hint .legend { margin-top:16px; display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  #hint .legend span { display:flex; align-items:center; gap:6px; font-size:15px; }
  #hint .dot { width:14px; height:14px; border-radius:4px; display:inline-block; }
</style>
</head>
<body>
  <div id="scene"></div>
  <div id="board"></div>

  <div id="hud"></div>
  <div id="title">點一下成熟發光的菜就能採收 · 算進該方格的贊助商</div>
  <button id="reset">🌱 重新整地</button>

  <div id="hint">
    <h1>🥬 開心農場</h1>
    <p>田地分給 <b>三個贊助商</b>,每格種一棵菜</p>
    <p>採收哪一格,就替那個贊助商 +1 🥬</p>
    <div class="legend" id="legend"></div>
    <button class="play" id="playBtn">開始採收</button>
  </div>

<script>
(function () {
  "use strict";

  /* ===== 可自行修改:三個贊助商(名稱 / emoji / 顏色) ===== */
  var SPONSORS = [
    { name: "綠田農場", emoji: "🟢", color: "#3aa655" },
    { name: "金穗果園", emoji: "🟠", color: "#e8893a" },
    { name: "鮮露菜坊", emoji: "🔵", color: "#3a86d6" }
  ];

  var COLS = 6, ROWS = 6;           // 6x6 = 36 格,每個贊助商 12 格
  var counts = [0, 0, 0];

  // 圖片載入失敗 → 後備漸層
  (function () {
    var url = "https://d8j0ntlcm91z4.cloudfront.net/user_3E8E7dfEkimdmsd0LdokMgNgQuE/hf_20260630_051943_5813a8e8-fef0-4062-aba4-28cbc2a0b441.png", img = new Image();
    img.onerror = function () { document.getElementById("scene").classList.add("fallback"); };
    img.src = url;
    setTimeout(function () { if (!img.complete) document.getElementById("scene").classList.add("fallback"); }, 4000);
  })();

  // 某一格屬於哪個贊助商:依欄位分三區(每 2 欄一區)
  function sponsorOf(col) { return Math.min(2, Math.floor(col / (COLS / 3))); }

  var board = document.getElementById("board");
  var hud = document.getElementById("hud");
  var legend = document.getElementById("legend");

  // 建立 HUD + 圖例
  SPONSORS.forEach(function (s, i) {
    var d = document.createElement("div");
    d.className = "sponsor"; d.style.setProperty("--c", s.color);
    d.innerHTML = '<div class="name">' + s.emoji + ' ' + s.name + '</div>' +
                  '<div class="cnt" id="cnt' + i + '">0</div>' +
                  '<div class="lbl">採收 🥬</div>';
    hud.appendChild(d);

    var lg = document.createElement("span");
    lg.innerHTML = '<i class="dot" style="background:' + s.color + '"></i>' + s.name;
    legend.appendChild(lg);
  });

  function lettuceSVG() {
    return '<svg viewBox="0 0 100 100" aria-hidden="true">' +
      '<g class="leaf">' +
      '<path d="M50 84 C20 80 12 52 26 40 C18 24 40 14 50 26 C60 14 82 24 74 40 C88 52 80 80 50 84Z" fill="#3f8f1f"/>' +
      '<path d="M50 80 C28 76 22 54 33 44 C27 30 44 24 50 34 C56 24 73 30 67 44 C78 54 72 76 50 80Z" fill="#5fb52f"/>' +
      '<path d="M50 74 C36 72 30 56 39 48 C35 38 46 34 50 42 C54 34 65 38 61 48 C70 56 64 72 50 74Z" fill="#86d64a"/>' +
      '<path d="M50 66 C42 65 38 56 43 50 C41 44 48 42 50 47 C52 42 59 44 57 50 C62 56 58 65 50 66Z" fill="#bdf07f"/>' +
      '</g></svg>';
  }

  var cells = [];   // {el, plot, crop, col, row, sp, state, timer}

  // 建立所有格子
  for (var row = 0; row < ROWS; row++) {
    for (var col = 0; col < COLS; col++) {
      var sp = sponsorOf(col);
      var wrap = document.createElement("div");
      wrap.className = "cell";

      var plot = document.createElement("div");
      plot.className = "plot";
      plot.style.setProperty("--c", SPONSORS[sp].color);

      var crop = document.createElement("div");
      crop.className = "crop";
      crop.innerHTML = lettuceSVG();

      wrap.appendChild(plot);
      wrap.appendChild(crop);
      board.appendChild(wrap);

      var cell = { el: wrap, plot: plot, crop: crop, col: col, row: row, sp: sp, state: "sprout", timer: null };
      (function (c) { crop.addEventListener("click", function (e) { harvest(c, e); }); })(cell);
      cells.push(cell);
      grow(cell, Math.random() * 2600);
    }
  }

  function setState(cell, s) {
    cell.state = s;
    cell.crop.classList.remove("sprout", "growing", "ready");
    cell.crop.classList.add(s);
  }
  // 永遠是種著的:sprout -> growing -> ready,採收後回到 sprout 再長
  function grow(cell, delay) {
    clearTimeout(cell.timer);
    setState(cell, "sprout");
    cell.timer = setTimeout(function () {
      setState(cell, "growing");
      cell.timer = setTimeout(function () { setState(cell, "ready"); }, 1600);
    }, delay || 0);
  }

  function harvest(cell, e) {
    if (cell.state !== "ready") return;
    counts[cell.sp] += 1;
    document.getElementById("cnt" + cell.sp).textContent = counts[cell.sp];

    var s = SPONSORS[cell.sp];
    showPop(e, "+1 🥬", s.color);
    blip();

    // 採收動畫:葉子縮一下,但方塊與菜本體都不會消失(立刻重新長)
    cell.crop.classList.remove("ready");
    var leaf = cell.crop.querySelector(".leaf");
    leaf.style.transition = "transform .18s ease";
    leaf.style.transform = "scale(.15)";
    setTimeout(function () { leaf.style.transition = ""; grow(cell, 250); }, 200);
  }

  function showPop(e, txt, color) {
    var p = document.createElement("div");
    p.className = "pop"; p.textContent = txt; p.style.color = color || "#fff";
    p.style.left = ((e && e.clientX) || innerWidth / 2) + "px";
    p.style.top = ((e && e.clientY) || innerHeight / 2) + "px";
    document.body.appendChild(p);
    setTimeout(function () { p.remove(); }, 900);
  }

  var actx = null;
  function blip() {
    try {
      actx = actx || new (window.AudioContext || window.webkitAudioContext)();
      var o = actx.createOscillator(), g = actx.createGain();
      o.type = "triangle";
      o.frequency.setValueAtTime(520, actx.currentTime);
      o.frequency.exponentialRampToValueAtTime(900, actx.currentTime + 0.08);
      g.gain.setValueAtTime(0.14, actx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.18);
      o.connect(g); g.connect(actx.destination);
      o.start(); o.stop(actx.currentTime + 0.2);
    } catch (err) {}
  }

  // ===== 等角(45度俯瞰)排版 =====
  function layout() {
    var vw = innerWidth, vh = innerHeight;
    // 讓整塊田寬度約佔畫面,並依視窗縮放
    var tileW = Math.min(vw / 6.4, vh / 5.4, 150);
    var tileH = tileW * 0.56;            // 2:1.1 菱形
    var cropW = tileW * 0.92, cropH = tileW * 0.92;

    var boardW = (COLS + ROWS) * (tileW / 2);
    var originX = vw / 2;                 // 中心
    var originY = vh * 0.30;              // 往上一點,留出 HUD

    cells.forEach(function (c) {
      var sx = originX + (c.col - c.row) * (tileW / 2);
      var sy = originY + (c.col + c.row) * (tileH / 2);
      c.el.style.left = sx + "px";
      c.el.style.top = sy + "px";
      c.el.style.width = "0px"; c.el.style.height = "0px";
      c.el.style.zIndex = (c.col + c.row);

      c.plot.style.width = tileW + "px";
      c.plot.style.height = tileH + "px";

      c.crop.style.width = cropW + "px";
      c.crop.style.height = cropH + "px";
    });
  }
  layout();
  addEventListener("resize", layout);

  document.getElementById("reset").addEventListener("click", function () {
    cells.forEach(function (c) { grow(c, Math.random() * 2200); });
  });
  document.getElementById("playBtn").addEventListener("click", function () {
    document.getElementById("hint").classList.add("hide");
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  });
})();
</script>
</body>
</html>
