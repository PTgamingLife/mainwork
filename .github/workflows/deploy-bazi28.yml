name: Deploy bazi28 to 28challenge

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bazi28/**"
      - ".github/workflows/deploy-bazi28.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mainwork
        uses: actions/checkout@v4

      - name: Clone 28challenge and copy files
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/PTgamingLife/28challenge.git /tmp/28challenge
          cp -R bazi28/. /tmp/28challenge/

      - name: Commit and push
        working-directory: /tmp/28challenge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --quiet && echo "No changes" || git commit -m "feat: deploy destiny calibration app"
          git push origin main
